version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    environment:
      - MONGO_INITDB_DATABASE=multitenant_taskmanager
  
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: server
    restart: always
    env_file: ./server/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - app-network
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/multitenant_taskmanager
  
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - app-network
    environment:
      - REACT_APP_API_URL=http://localhost/api

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
